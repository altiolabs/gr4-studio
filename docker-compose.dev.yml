services:
  gr4-studio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_GRCTRL_BASE_URL: http://host.docker.internal:8080
      CHOKIDAR_USEPOLLING: 'true'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      - gr4_studio_node_modules:/app/node_modules

volumes:
  gr4_studio_node_modules:
